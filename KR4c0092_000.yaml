  text: 玉川子詩集目録
  hash: sha256:3ee878d28cdfc7d61b29c1860ea01772a67f7e4f884a7680c381147de5f01305
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0092_SBCK_000-1a}
body:
  text: 卷第一古今詩月蝕詩哭玉碑子觀放魚歌示添丁寄男抱孫自詠三首送王儲詹事西逰獻兵書送卲兵曹㱕江南寄外兄魏徹喜逄鄭三逰山卓女怨守歲二首新月解悶楊子津人日立春送尉遲羽之㱕宣州憶酒寄劉侍郎白鷺鷥風中琴感秋别怨新蟬題禇遂良孫庭竹訪含曦上人含曦酬客淮南病村醉蕭宅二三子贈答詩二十首有序卷第二古今骵雜著走茟追王內丘思君吟寄生將歸山招冰僧酬願公雪中見寄苦雪寄退之寄贈含曦上人聽蕭君姫人彈琴蜻蜓歌出山作寄崔栁州贈稚禪師送好約法師歸江南蕭二十三赴歙州婚期二首掩關銘玉川子詩外集序唐玉川先生盧同履道守正之莭見于昌黎退之之文當時洛中才名碩德者如溫石二處士咸應辟署吏于諸侯惟先生自顧俯仰不能與丗合築環堵以居休焉遂志而浩浩自娛觀其出處之迹若人哉安可輕量矣又傳先生春秋之學舉丗莫淂見其書故人不淂窺其涯涘矣但歌詩百萹􅍢板已行于丗其為體峭挺嚴放脫略拘維特立群品之外要夫指事措意于救物之為忠憤切深者矣常愛其詩恨不淂多見其篇近友人李生于道士崔懷玉處又淂集外一十五首余甚喜之以編附舊夲且夫人之愚哲存乎性道之用舍係乎時倘氣類孚應上下感㑹則見諸行事于空言安足貴尚㦲惜其失志窮時用是欲傳其言耳謹序其槩以貽于好事者云時慶曆八年仲冬望日昌黎韓盈謙甫序
