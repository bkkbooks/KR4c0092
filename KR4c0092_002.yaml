front:
  text: 玉川子詩集卷第二
  hash: sha256:1c474b251b1726401176c7e20627123defecd34d2b384e9aaa82036ba42b8afb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0092_SBCK_002-1a}
body:
  text: 古今體雜著龜銘龜汝靈于人不靈于身致網于津吾靈于身不靈于人致赱于塵龜吾與汝鄰梳銘有髮兮朝朝思理有身兮胡不如是小婦吟小婦欲入門隈門勻紅粧大婦出門迎整頓羅衣裳門邉兩相見笑樂不可當夫子于傍聊斷腸小婦哆隄上髙堂開玉匣取琴張陳金罍酌滿觴願言兩相樂永與同心事我郎夫子于傍剩欲狂珠簾風度百花香翠帳雲屏白玉牀啼鳥休啼花莫笑女英新喜淂娥皇月下寄徐希仁夜半沙上行月瑩天心明沙月浩無際此中離思生上天何寥廓下地何崢嶸吾道豈已矣為君傾兕觥贈徐希仁石硯别靈山一片不靈石手斫成器心所惜鳳鳥不至池不成蛟龍乾蟠水空滴青松火鍊翠煙凝寒竹風搖逺天碧今日贈君離别心此中至淺造化深用之可以過圭璧棄置還為一片石有所思當時我醉美人家美人顔色嬌如花今日美人棄我去青樓珠箔天之涯娟娟姮娥月三五盈又缺翠眉蟬鬢生别離一望不見心斷絶心斷絶幾千里夢中醉卧巫山雲覺來泪滴湘江水湘江兩岸花木深美人不見愁人心含愁更奏緑綺琴調髙絃絶無知音美人兮美人不知為暮雨兮為朝雲相思一夜梅花發忽到窗前疑是君樓上女兒曲誰家女兒樓上頭指揮婢子挂簾鈎林花撩亂心之愁卷却羅袖彈箜篌箜篌歷亂五六絃羅袖掩面啼向天相思絃斷情不斷落花紛紛心欲穿心欲穿慿欄干相憶栁條緑相思錦帳寒直緣感君恩愛一回顧使我雙淚長珊珊我有嬌靨待君笑我有嬌娥待君掃鶯花爛熳君不來及至君來花已老心腸寸斷誰淂知玉階羃歷生青草秋夢行客行一夜秋風起客夢南逰渡湘水湘水泠冷徹􅔄清二妃怨處無限情娥皇不語啓嬌靨女英目心愜長眉入鬢何連娟肌膚白玉秀且鮮徘徊共詠東方日沉吟再理南風絃聲斷續思綿綿中含幽意兩不宣殷勤纎手驚破夢中宵寂寞心悽然心悽然腸亦絶寐不寐兮玉枕寒夜深夜兮霜似雪鏡中不見雙翠眉臺前空挂纎纎月纎纎月盈𣸪缺娟娟似眉意難訣願此眉兮如此月千里萬里光不滅自君之出矣自君之出矣壁上蜘蛛織近取見妄心夜夜無休息妾有雙玉環寄君表相憶環是妾之心玉是君之德馳情增悴容薔思損精力玉簟寒悽悽延想心惻惻風含霜月明水泛碧天色此水有盡時此情無終極赱筆謝孟諫議新茶日髙丈五睡正濃軍將打門驚周公口云諌議送書信白絹斜封三道印開緘宛見諌議面手閲月團三百片聞道新年入山裏蟄蟲驚動春風起天子須嘗陽羡茶百草不敢先開花仁風暗結珠琲瓃先春抽出黃金芽摘鮮焙芳旋封褁至精至好且不奢至尊之餘合王公何事便到山人家柴門反關無俗客紗帽籠頭自煎喫碧雲引風推不斷白花浮光凝碗面一碗喉吻潤兩碗破孤悶三碗搜枯腸唯有文字五千卷四碗發輕汗􅊭生不乎事盡向毛孔散五碗肌骨清六碗通仙靈七碗喫不淂也惟覺兩腋習習清風生蓬萊山在何處玉川子乘此清風欲歸去山上羣仙司下土地位清髙隔風雨安淂知百萬億蒼生命墮在巔崖受辛苦便為諫議問蒼生到頭還淂蘇息否冬行三首蟲豸臘月皆在蟄吾獨何乃勞其形小大無由知天命但怪守道不淂寧老母妻子一揮手涕下便作千里行自顧不及遭霜葉旦夕保淂同飄零達生何足云偶然苦樂經其身古來堯孔與桀跖善惡何輔如今人長年愛伊洛決計卜長久賖買里仁宅水竹且小有賣宅將還資舊業苦不厚債家徵利心餓虎血染口臘風刀刻肌遂向東南赱賢哉韓員外勸吾莫強取憑風謝長者敢不愧心苟賃載淂估舟估雜非吾偶壯色排榻席别座夸羊酒落日無精光啞瞑被掣肘漕石生齒牙洗灘亂相掫奔嘶嚼篙杖夾岸雪龍吼可憐聖明朝還為喪家狗通運隔南溟債利拄北斗揚州屋舍賤還債堪了不此宅貯書籍地濕憂蠧朽賈僎舊相識十年與營守貧交多變態僎淂君子否利命子罕言我誠孔門醜且貴終焉圖死免慙狐首何當歸帝鄊白雲永相友不敢唾汴水汴水入東海汙泥龍王宫恐獲不敬罪不敢踏汴堤汴堤連秦宫踏盡天子土餽餫無由通此言雖太闊且是臣心腸野風結隂兵千里鳴刀槍海月護羈魄到曉點孤光上不事天子下不識侯王夜半睡獨覺爽氣盈心堂顔子甚年少孔聖同行藏我年過顔子敢道不自強船人雖奴兵亦有意智長問我何所淂樂邑填清揚我報果有為孔經在衣裳常州孟諌議座上聞韓員外職方貶國子博士有感五首忽見除書到韓君文學宫死生從有命人事始知難烈火先燒玉庭蕪不飬蘭山夫與刺史相對兩巑岏干祿無便佞宜知黜此身員郎猶小小國學大頻頻孤宦心肝直天王苦死嗔朝廷無諫議誰是雪韓人何事遭朝貶知何被不容不如思所自只欲涕無從爵服何曽好荷衣已慣縫朝官莫相識歸去老岩松力小垂垂上天髙又不登致身惟一已獲罪則顔朋祿位埋坑穽康莊壘劍稜公卿共惜取莫遣玉山崩誰憐野田子海內一韓侯左道官雖樂剛腸淂健無功名生地獄禮教死天囚莫言耕種好須避蒺䔧秋夏夜聞蚯蚓吟夏夜雨欲作傍砌蚯蚓今念爾無筋骨也應天地心汝無親朋纍汝無名利侵孤韻似有説哀怨何其深泛泛輕薄子旦夕還謳吟肝膽異汝輩熱血徒相侵揚州送伯齡過江伯齡不厭山山不飬伯齡松顛有樵墮石上無禾生不認六尺軀遂作東南行諸侯盡食肉壯氣吞八紘不唧溜鈍漢何由通姓名夷齊餓死日武王稱聖明莭義士枉死何異鴻毛輕努力事千謁我心終不平憶金鵝山沈山人二首君家山頭松樹風適來入我竹林裏一片新茶破鼻香請君速來助我喜莫合九轉大還丹莫讀三十六部大洞經間來共我説真意齒下領取真長生不須服藥求神仙神仙意智或偶然自古聖賢放入土淮南雞犬驅上天白日上升應不惡藥成且啜一凡藥暫時上天少問天蛇頭蝎尾誰安著君愛錬藥藥欲成我愛錬骨骨已清試自比校淂仙者也應合淂天上行天門九重髙崔嵬清空鑿出黃金堆夜義守門晝不啓夜半醮祭夜半開夜義喜􅌚動關鎖鎖聲㩧地生風雷地上禽獸重血食性命血化飛黃埃太上道君蓮花臺九門隔闊安在哉嗚呼沈君大藥成兼須巧會鬼物情無求長生喪厥生寄蕭二十三慶中蕭乎蕭乎憶蕭者嵩山之盧盧楊州蕭歙州相思過春花鬢毛生麥秋千災萬􅏜天南道猩猩鸚鵡皆人言山魈吹火蟲入碗鴪鳥呪咀鮫吐延就中南瘴欺北客慿君數磨犀角喫我憶君心千百間千百間君何時還使我夜夜勞魂魄贈金鵝山人沈師魯金鵝山中客來到揚州市買藥床頭一破顔撇然便有上天意日月髙挂玄關深金膏切淬肌骨異人皆食榖與五味獨食太和隂陽氣浩浩流珠赱百關綿綿若存有深致種玉不耕山外非內粹鑿儒關決文泉彰風雅因君不𣸪墜光不外照刃不磨回避人間惡富貴三日四日五六日盤礴化元搜萬類晝飲興酣陶天和夜話造微精魅示我插血不死方賞我風格不肥膩肉眼不識天上書小儒安敢窺奧祕崑崙路隔西北天三山沒浮不著地君到頭上憶我時金簡為吾鐫一字歎昨日三首昨日之日不可追今日之日須臾期如此如此𣸪如此壯心死盡生鬢絲秋風落葉客腸斷不辧斗酒開愁眉賢名聖行甚辛苦周公孔公徒自欺天下薄夫苦耽酒玉川先生也耽酒薄夫有錢恣張樂先生無錢養怙漠有錢無錢俱可憐百年驟過如流川平生心事消散盡天上白日悠悠懸上帝版版主何物日車劫劫西向沒自古聖賢無奈何道行不淂皆白骨白骨土化鬼入泉生人莫負平生年何時出淂禁酒國滿甕釀酒曝背眠月蝕詩東海出明月清明照毫髮朱絃𥘉罷彈玉兔正竒絶三五與二八此時光滿時頗奈蝦蟆兒吞我芳桂枝我愛明鏡潔爾乃痕翳之爾且無六翮焉淂升天涯方寸有白刃無由揚清輝如何萬里光遭爾小物欺却吐天漢中良久素魄微日月尚如此人情良可知直鈎吟𥘉歲學釣魚自謂魚昜淂三十持釣竿一魚釣不淂人鈎曲我鈎直哀哉我鈎又無食文王已沒不𣸪生直鈎之道何時行與馬異結交詩天地日月如等間盧同四十無往還唯有一片心脾骨巉岩崒硉兀鬱律刀劒為峯崿平地放著髙如崑崙山天不容地不受日月不敢偷照耀神農畫八卦鑿破天心胸女媧夲是伏羲婦恐天怒搗鍊五色石引日月之針五星之縷把天輔補了三日不肯歸壻家赱向日中放老鴉月裏栽桂飬蝦蟆天公發怒化龍蛇此龍此蛇淂死病神農合藥救死命天怪神農黨龍蛇罰神農為牛頭令載元氣車不知藥中有毒藥藥殺元氣天不覺爾來天地不神聖日月之光無正定不知元氣元不死忽聞空中喚馬異馬異若不是祥瑞空中敢道不容昜昨日同不同異自異是謂大同而小異今日同自同異不異是謂同不往兮異不至直當中兮動天地白玉璞裏斫出相思心黃金礦裏鑄出相思淚忽聞空中崩崖倒谷聲絶勝明珠千萬斛買淂西施南威一雙婢此婢嬌嬈惱殺人凝脂為膚翡翠裙唯解畫眉朱點唇自從獲淂君敲金摐玉凌浮雲却返顧一雙婢子何足云平生結交若少人憶君眼前如見君青雲欲開白日沒天眼不見此竒骨此骨縱橫竒又竒千歲萬歲枯松枝半折半殘壓山谷盤根蹙莭成蛟螭忽雷霹靂卒風暴雨撼不動欲動不動千變萬化總是鱗皴皮此竒怪物不可欺盧同見馬異文章酌淂馬異胸中事風姿骨本恰如此是不是寄一字馬異答盧同結交詩有鳥南翔口銜一書札逹我山之維開緘金玉煥陸離乃是盧同結交詩此詩峭絶天邉格力與文星色相射長河拔作數條絲太華磨成一拳石莫嗟獨秀無往還月中芳桂難追攀况值亂邦不平年回陵倒谷如等間與君俯首大艱阻喙長三尺不淂語因君今日形章句羡獼猴子著衣裳悲蚯蚓兮安翅羽上天不識察仰我為遼天失所將吾劍兮切淤泥使良驥兮捕老鼠昨日脫身卑賤籠茆屋借與老人峰抱鋤􅓯地藝芝术偃蓋參天舊有松术與松兮保身丗卧居居兮起吁吁漱潺潺兮聆嘒嘒道在其中可終歲不教辜負堯為帝燒我荷衣摧我身回看天地如砥平鋼刀銼骨不辭去畢躬君子今明明俯首辭山心慘惻白雲雖好戀不淂看雲且擬直須臾疾風又卷西飛翼為報覃懷新結交死生富貴存後凋我心不畏朱公叔君意須防劉孝標以膠投􅃮苦不早就中相去萬里道河水悠悠山之間無由把𬒮攄懷抱憶同吟文能治臭成蘭薰不知何處清風夕擬使張華見陸雲感古四首天生聖明君必資忠賢臣舜禹竭股肱共佐堯為君四載成地理七政齊天文階下􅕴莢生琴上南風薰輪轉夏殷周時復猶一人秦漢事讒巧魏晉忘機鈞猜忌相翦滅邇來迷恩親以愚保其身不覺身沉淪以智理其國遂為國之賊苟圗容一身萬事良可惻可憐萬乘君聰眀受沉惑忠良伏草莽無因施羽翼日月異又蝕天地晦如墨既亢而𣸪求異哉龍之龍人生何所貴所貴有終始昨日盈尺璧今朝盡瑕棄蒼蠅點垂棘巧舌成錦綺箕子為之奴比干諌而死仲尼魯司冦出赱為羣婢假如屈原醒其奈一國醉一國醉號呶一人行清髙便欲激頽波此事真徒勞上山逄猛虎入海逄巨鼇王者苟不死腰下魚鱗刀東海波連天三度成桑田髙岸髙于屈斯須變溪谷天地猶尚然人情難久全夜半白刃仇旦來金石堅蕭綬既解坼陳印亦棄捐竭莭遇刀割輸忠遭􅍔纏不豫衾之眠信豫衾之穿鏡明不自照膏潤徒自煎抱劍長太息墮淚秋風前古來不患寡所患患不均單醪投長河三軍盡沉淪今人異古人結託唯親賔毁坼維鵲巢不行鳲鳩仁鄙吝不識分有心占陽春鸞鶴日已疏燕雀日已親小物無大志安測栖松筠恩眷多棄故物情尚逐新瓦䃯暫拂拭光掩連城珍唇吻恣談鑠黃金同灰塵蘇秦北逰趙張祿西入秦既變嫂叔莭仍擯華陽君萬丗金石交一餉如浮雲骨肉且不顧何况長羈貧君莫以富貴輕忽他年少聽我暫話會稽朱太守正受凍餓時索淂人家貴傲婦讀書書史未潤身負薪辛苦胝生肘謂言琴與瑟糟粳結長久不分殺人羽翮成􅎔􅎔沖天婦嫌醜其奈一朝太守振羽儀鄊關晝行衣錦衣哀哉舊婦何眉目新壻隨行向天哭寸心金石徒爾為杯水庭沙空自覆乃知愚婦人妬忌隂毒心惟救眼底事不思日月深等間取羞死豈如甘布衾雜興意智未成百不解見人冨貴亦心愛等間對酒呼三達屠羊殺牛皆自在放心為樂笙歌攢壯氣激作風霜寒厨中玉饌盈金盤方丈厭見嫌不餐飛鷹躍馬實快性唇腐齒爛空巑岏豈期福極翻成􅍔􅍔成身誅家亦破昨朝惆悵不如君今日悲君不如我否泰交加無定主懶學風雲戢翎羽緑酒清琴好飬生出將入相無心取三五圖書舊揣摩五千道德新規矩酬徐公以新文見招昨夜霜月明果有清音生便欲赱相和愁聞寒玉聲招玉川子詠新文清氣宿我心結為清泠音一夜吟不足君來相和吟門針貪殘姦酗狡佞訐愎身之八殺背惠恃已狎不肖妬賢能命之四孽有是有此豫敢辭無是無此豫之師一日不見豫心思思其人懼其人其交其難敢告于門孟夫子生生亭賦玉川子沿寒冬之寒流兮輟棹上登生生亭夫子何之兮面遂雲沒兮南行百川注海而心不寫兮落日千里凝寒精豫日衰期人生之丗斯已矣爰為今日猶猶岐路之心生悲夫南國風濤魚龍畜伏豫小豫戅朴必不能濟夫子欲嗟自慙承夫子而不失豫兮傳古道甚分明豫且廣孤目遐賫于天壤兮庶淂外盡萬物變化之幽情然後慙愧而來歸兮太息吾躬于夫子之亭
