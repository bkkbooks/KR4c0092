front:
  text: 玉川子詩集卷第二
  hash: sha256:1c474b251b1726401176c7e20627123defecd34d2b384e9aaa82036ba42b8afb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0092_SBCK_002-1a}
body:
  text: 古今體雜著亀銘亀汝靈于人不靈于身致網于津吾靈于身不靈于人致赱于塵亀吾與汝隣梳銘有髪兮朝朝思理有身兮胡不如是小婦吟小婦欲入門隈門匀紅粧大婦出門迎整頓羅衣裳門邉両相見笑楽不可當夫子于傍聊断腸小婦哆隄上髙堂開玉匣取琴張陳金罍酌滿觴願言両相楽永與同心亊我郎夫子于傍剰欲狂珠簾風度百花香翠帳雲屏白玉牀啼鳥休啼花莫笑女英新喜淂娥皇月下寄徐希仁夜半沙上行月瑩天心明沙月浩無際此中離思生上天何寥廓下地何崢嵘吾道豈已矣為君傾兕觥贈徐希仁石硯别靈山一片不靈石手斵成器心所惜鳳鳥不至池不成蛟龍乾蟠水空滴青松火鍊翠煙凝寒竹風摇逺天碧今日贈君離别心此中至淺造化深用之可以過珪璧棄置還為一片石有所思當時我醉美人家美人顔色嬌如花今日美人棄我去青楼珠箔天之涯娟娟姮娥月三五盈又缺翠眉蝉鬂生别離一望不見心断絶心断絶㡬千里夣中醉卧巫山雲覺来泪滴湘江水湘江両岸花木深美人不見愁人心含愁更奏緑綺琴調髙絃絶無知音美人兮美人不知為暮雨兮為朝雲相思一夜梅花發忽到窓前疑是君楼上女児曲誰家女児楼上頭指揮婢子掛簾鈎林花撩亂心之愁卷却羅䄂弹箜篌箜篌歴亂五六絃羅䄂掩面啼向天相思絃断情不断落花紛紛心欲穿心欲穿慿欄干相憶栁條緑相思錦帳寒直縁感君㤙愛一廻頋使我雙淚長珊珊我有嬌靨待君笑我有嬌娥待君掃鶯花爛熳君不来及至君来花已老心腸寸断誰淂知玉階羃歴生青草秋夣行客行一夜秋風𧺫客夣南逰渡湘水湘水泠冷徹􅔄清二妃怨處無限情娥皇不語啟嬌靨女英目心惬長眉入鬂何連娟肌膚白玉秀且鮮徘徊共詠東方日沉吟再理南風絃聲断續思綿綿中含幽意両不宣殷勤纎手驚破夣中宵寂寞心悽然心悽然腸亦絶寐不寐兮玉枕寒夜深夜兮霜似雪鏡中不見雙翠眉䑓前空掛纎纎月纎纎月盈𣸪缺娟娟似眉意難訣願此眉兮如此月千里萬里光不滅自君之出矣自君之出矣壁上蜘蛛織近取見妄心夜夜無休息妾有雙玉環寄君表相憶環是妾之心玉是君之徳馳情増悴容薔思損精力玉簟寒悽悽延想心惻惻風含霜月明水泛碧天色此水有盡時此情無終極赱筆謝孟諫議新茶日髙丈五睡正濃軍将打門驚周公口云諌議送書信白絹斜封三道印開緘宛見諌議面手閲月團三百片聞道新年入山裏蟄虫驚動春風𧺫天子湏嘗陽羡茶百草不敢先開花仁風暗結珠琲瓃先春抽出黄金芽摘鮮焙芳旋封褁至精至好且不奢至尊之餘合王公何亊便到山人家柴門反關無俗客紗帽籠頭自煎喫碧雲引風推不断白花浮光凝椀面一椀喉吻潤両椀破孤悶三椀搜枯腸唯有文字五千卷四椀發輕汗􅊭生不乎亊盡向毛孔散五椀肌骨清六椀通仙靈七椀喫不淂也惟覺両腋習習清風生蓬莱山在何處玉川子乗此清風欲歸去山上羣仙司下土地位清髙隔風雨安淂知百萬億蒼生命堕在巔崖受辛苦便為諫議問蒼生到頭還淂蘓息否冬行三首蟲豸臘月皆在蟄吾獨何乃劳其形小大無由知天命但怪守道不淂寕老母妻子一揮手涕下便作千里行自頋不及遭霜葉旦夕保淂同飄零達生何足云偶然苦楽經其身古来堯孔與桀跖善悪何𥙷如今人長年爱伊洛决計卜長久賖買里仁宅水竹且小有賣宅将還資舊業苦不厚債家徵利心餓虎血染口臘風刀刻肌遂向東南赱賢哉韓員外勸吾莫強取憑風謝長者敢不愧心苟賃載淂估舟估雜非吾偶壮色排榻席别座夸羊酒落日無精光啞瞑被掣肘漕石生齒牙洗灘亂相掫奔嘶嚼篙杖夹岸雪龍吼可憐聖明朝還為䘮家狗通運隔南溟債利拄北斗揚州屋舎賤還債堪了不此宅貯書籍地湿憂蠧朽賈僎旧相識十年與营守貧交多変態僎淂君子否利命子罕言我誠孔門醜且貴終焉圖死免慙狐首何當歸帝鄊白雲永相友不敢唾汴水汴水入東海汙泥龍王宫恐獲不敬罪不敢蹋汴堤汴堤連秦宫蹋盡天子土餽餫無由通此言雖太闊且是臣心腸野風結隂兵千里鳴刀槍海月䕶覊魄到暁㸃孤光上不亊天子下不識侯王夜半睡獨覺爽氣盈心堂顔子甚年少孔聖同行藏我年過顔子敢道不自強船人雖奴兵亦有意智長問我何所淂楽邑填清揚我報果有為孔經在衣裳常州孟諌議座上聞韓員外職方貶國子愽士有感五首忽見除書到韓君文學宫死生従有命人亊始知難烈火先燒玉庭蕪不飬蘭山夫與刺史相對両㠝岏干禄無便佞宜知黜此身員郎猶小小國學大頻頻孤宦心肝直天王苦死嗔朝廷無諫議誰是雪韓人何亊遭朝貶知何被不容不如思所自只欲涕無従爵服何曽好荷衣已慣縫朝官莫相識㱕去老岩松力小垂垂上天髙又不登致身惟一已獲罪則顔朋禄位埋坑穽康荘壘劍稜公卿共惜取莫遣玉山崩誰憐野田子海内一韓侯左道官雖楽剛腸淂徤無功名生地獄禮教死天囚莫言耕種好湏避蒺䔧秋夏夜聞蚯蚓吟夏夜雨欲作傍砌蚯蚓今念爾無筋骨也應天地心汝無親朋累汝無名利侵孤韵似有説哀怨何其深汎汎輕薄子旦夕還謳吟肝膽異汝軰熱血徒相侵揚州送伯齡過江伯齡不厭山山不飬伯齡松㒹有樵堕石上無禾生不認六尺軀遂作東南行諸侯盡食肉壮氣吞八紘不唧溜鈍漢何由通姓名夷齊餓死日武王稱聖明莭義士枉死何異鴻毛輕努力亊千謁我心終不平憶金鵞山沈山人二首君家山頭松樹風適来入我竹林裏一片新茶破鼻香請君速来助我喜莫合九轉大還丹莫讀三十六部大洞經閑来共我說真意齒下領取真長生不湏服薬求神仙神仙意智㦯偶然自古聖賢放入土淮南雞犬驅上天白日上昇應不悪薬成且啜一凡薬暫時上天少問天虵頭蝎尾誰安著君爱錬薬薬欲成我爱錬骨骨已清試自比校淂仙者也應合淂天上行天門九重髙崔嵬清空鑿出黄金堆夜义守門晝不啟夜半醮祭夜半𨳩夜义喜􅌚動關鎖鎖声㩧地生風雷地上禽獸重血食性命血化飛黄埃太上道君蓮花䑓九門隔闊安在㢤嗚呼沈君大薬成兼湏巧㑹鬼物情無求長生䘮厥生寄蕭二十三慶中蕭乎蕭乎憶蕭者嵩山之盧盧楊州蕭歙州相思過春花鬂毛生麥秋千灾萬􅏜天南道猩猩鸚鵡皆人言山魈吹火蟲入椀鴪鳥呪咀鮫吐延就中南瘴欺北客慿君数磨犀角喫我憶君心千百間千百間君何時還使我夜夜劳魂魄贈金鵝山人沈師魯金鵝山中客来到揚州市買薬床頭一破顔撇然便有上天意日月髙挂玄関深金膏切淬肌骨異人皆食榖與五味獨食太和隂陽氣浩浩流珠赱百関綿綿若存有深致種玉不耕山外非内粹鑿儒関决文泉彰風雅因君不𣸪墜光不外照刃不磨廻避人間悪富貴三日四日五六日盤礴化元搜萬類晝飲興酣陶天和夜話造㣲精魅示我挿血不死方賞我風格不肥膩肉眼不識天上書小儒安敢窺奥秘崑崙路隔西北天三山没浮不著地君到頭上憶我時金簡為吾鐫一字歎昨日三首昨日之日不可追今日之日湏臾期如此如此𣸪如此壮心死盡生鬂絲秋風落葉客腸断不辧斗酒開愁眉賢名聖行甚辛苦周公孔公徒自欺天下薄夫苦耽酒玉川先生也耽酒薄夫有錢恣張楽先生無錢養怙漠有錢無錢俱可憐百年驟過如流川平生心亊消散盡天上白日悠悠懸上帝版版主何物日車刼刼西向沒自古聖賢無奈何道行不淂皆白骨白骨土化鬼入泉生人莫負平生年何時出淂禁酒國滿甕醸酒曝背眠月蝕詩東海出明月清明照毫髪朱絃𥘉罷弹玉兎正竒絶三五與二八此時光滿時頗奈蝦䗫児吞我芳桂枝我爱明鏡潔爾乃痕翳之爾且無六翮焉淂升天涯方寸有白刄無由揚清輝如何萬里光遭尔小物欺却吐天漢中良久素魄㣲日月尚如此人情良可知直鈎吟𥘉歲學釣魚自謂魚昜淂三十持釣竿一魚釣不淂人鈎曲我鈎直哀㢤我鈎又無食文王已沒不𣸪生直鈎之道何時行與馬異結交詩天地日月如等閑盧仝四十無徃還唯有一片心脾骨巉岩崒硉兀欝律刀劒為峯崿平地放著髙如崑崙山天不容地不受日月不敢偷照耀神農畫八卦鑿破天心胸女媧夲是伏羲婦恐天怒擣鍊五色石引日月之針五星之縷把天𥙷補了三日不肯㱕婿家赱向日中放老鵶月裏栽桂飬蝦䗫天公發怒化龍蛇此龍此蛇淂死病神農合薬救死命天怪神農党龍蛇罰神農為牛頭令載元氣車不知薬中有毒薬薬殺元氣天不覺爾来天地不神聖日月之光無正定不知元氣元不死忽聞空中喚馬異馬異若不是祥瑞空中敢道不容昜昨日仝不同異自異是謂大仝而小異今日仝自同異不異是謂仝不徃兮異不至直當中兮動天地白玉璞裏斵出相思心黄金鑛裏鑄出相思淚忽聞空中崩崖倒谷聲絶勝明珠千萬斛買淂西施南威一䨇婢此婢嬌嬈惱殺人凝脂為膚翡翠裙唯解畫眉朱點唇自従獲淂君敲金㧿玉凌浮雲却返頋一雙婢子何足云平生結交若少人憶君眼前如見君青雲欲開白日没天眼不見此竒骨此骨縦横竒又竒千歲萬歲枯松枝半折半殘壓山谷盤根蹙莭成蛟螭忽雷霹靂卒風暴雨撼不動欲動不動千変萬化縂是鱗皴皮此竒怪物不可欺盧仝見馬異文章酌淂馬異胸中亊風姿骨本恰如此是不是寄一字馬異答盧仝結交詩有鳥南翔口銜一書札逹我山之維開緘金玉煥陸離乃是盧仝結交詩此詩峭絶天邉格力與文星色相射長河㧞作数條絲太華磨成一拳石莫嗟獨秀無徃還月中芳桂難追攀况值亂邦不平年廻陵倒谷如等閑與君俛首大艱阻喙長三尺不淂語因君今日形章句羡獼猴子著衣裳悲蚯蚓兮安翅羽上天不識察仰我為遼天失所将吾劍兮切淤泥使良驥兮捕老䑕昨日脱身卑賤籠茆屋借與老人峰抱鋤􅓯地芸芝术偃盖参天舊有松术與松兮保身丗卧居居兮𧺫吁吁漱潺潺兮聆嘒嘒道在其中可終歲不教辜負尭為帝燒我荷衣摧我身廻㸔天地如砥平鋼刀剉骨不辭去畢躬君子今明明俛首辭山心惨惻白雲雖好恋不淂㸔雲且擬直湏臾疾風又卷西飛翼為報覃懐新結交死生富貴存後凋我心不畏朱公叔君意湏防劉孝標以膠投􅃮苦不早就中相去萬里道河水悠悠山之間無由把𬒮攄懐抱憶仝吟文能治臭成蘭薫不知何處清風夕擬使張華見陸雲感古四首天生聖明君必資忠賢臣舜禹竭股肱共佐尭為君四載成地理七政齊天文階下􅕴莢生琴上南風薰輪轉夏殷周時復猶一人秦漢亊讒巧魏晋忘机鈞猜忌相翦滅迩来迷恩親以愚保其身不覺身沉淪以智理其國遂為國之賊苟圗容一身萬事良可惻可憐萬乗君聪眀受沉惑忠良伏草莽無因施羽翼日月異又蝕天地晦如墨既亢而𣸪求異㢤龍之龍人生何所貴所貴有終始昨日盈尺璧今朝盡瑕棄蒼蝇點垂棘巧舌成錦綺箕子為之奴比干諌而死仲尼魯司冦出赱為羣婢假如屈原醒其奈一國醉一國醉號呶一人行清髙便欲激頽波此亊真徒劳上山逄猛虎入海逄巨鼇王者苟不死腰下魚鱗刀東海波連天三度成桑田髙岸髙于屈斯湏変溪谷天地猶尚然人情難久全夜半白刄仇旦来金石堅蕭綬既觧坼陳印亦棄捐竭莭遇刀割輸忠遭􅍔纏不予衾之眠信予衾之穿鏡明不自照膏潤徒自煎抱劍長太息堕淚秋風前古来不患寡所患患不均單醪投長河三軍盡沉淪今人異古人結託唯親賔毁坼維鵲巢不行鳲鳩仁鄙恡不識分有心占陽春鸞鶴日已疎燕雀日已親小物無大志安測栖松筠恩眷多棄故物情尚逐新瓦䃯暫拂拭光掩連城珍唇吻恣談鑠黄金同灰塵蘇秦北逰趙張禄西入秦既変嫂叔莭仍擯華陽君萬丗金石交一餉如浮雲骨肉且不頋何况長覊貧君莫以富貴輕忽他年少聴我暫話會稽朱太守正受凍餓時索淂人家貴傲婦讀書書史未潤身負薪辛苦胝生肘謂言琴與瑟糟糠結長久不分殺人羽翮成􅎔􅎔冲天婦嫌醜其奈一朝太守振羽儀鄊關晝行衣錦衣哀㢤旧婦何眉目新婿随行向天哭寸心金石徒爾為盃水庭沙空自覆乃知愚婦人妬忌隂毒心惟救眼底亊不思日月深等閑取羞死豈如甘布衾雜興意智未成百不觧見人冨貴亦心爱等閑對酒呼三達屠羊殺牛皆自在放心為樂笙歌攅壮氣激作風霜寒厨中玉饌盈金盤方丈厭見嫌不飡飛鷹躍馬實快性唇腐齒爛空㠝岏豈期福極翻成􅍔􅍔成身誅家亦破昨朝惆悵不如君今日悲君不如我否㤗交加無定主懶學風雲戢翎羽緑酒清琴好飬生出将入相無心取三五圖書舊揣摩五千道徳新規矩酬徐公以新文見招昨夜霜月明果有清音生便欲赱相和愁聞寒玉聲招玉川子詠新文清氣宿我心結為清泠音一夜吟不足君来相和吟門箴貪殘奸酗狡佞訐愎身之八殺背惠恃已狎不肖妬賢能命之四孽有是有此予敢辭無是無此予之師一日不見予心思思其人懼其人其交其難敢告于門孟夫子生生亭賦玉川子沿寒冬之寒流兮輟棹上登生生亭夫子何之兮面遂雲没兮南行百川注海而心不寫兮落日千里凝寒精予日衰期人生之丗斯已矣爰為今日猶猶岐路之心生悲夫南國風濤魚龍畜伏予小予戅朴必不能濟夫子欲嗟自慙承夫子而不失予兮傳古道甚分明予且廣孤目遐賫于天壌兮庶淂外盡萬物変化之幽情然後慙愧而来㱕兮太息吾躬于夫子之亭
