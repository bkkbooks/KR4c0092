front:
  text: 玉川子集􅃃第一
  hash: sha256:a4e87173f8dc9a1e5a8d9e5642be618fa640716574e8be39d74594070b709b5d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0092_SBCK_001-1a}
body:
  text: 古今詩月蝕詩新天子即位五年􅀊次庚寅斗柄挿子律調黃鍾森森萬木夜殭立寒氣贔屓頑無風爛銀盤從海底出岀来照我草屋東天色紺滑凝不流氷光交貫寒朣朧􅀄疑白蓮花浮出龍王宫八月十五夜比並不可雙此時怪亊發有物吞食来輪如壮士斧斫壊桂似雪山風拉摧百錬鏡照見膽平地埋寒􅁅火龍珠飛出腦却入蚌蛤胎摧環破壁眼看盡當天一搭如煤炲磨蹤滅跡湏􅁷間便似萬古不可開不料至神物有此大狼狽星如撒沙出爭頭事光大奴婢炷暗燈揜鳥感菼如玳瑁今夜􅄍􅆋長如虹孔􅂩千道射户外玉川子涕泗下中庭獨自行念此日月者太隂太陽精皇天要識物日月乃化生走天汲汲劳四體與天作眼行光明此眼不自保天公行道何由行吾見隂陽家有説望日蝕月月光滅朔月掩日日光缺両眼不相攻此説吾不容又孔子師老子云五色令人目盲吾􅂲天似人好色即䘮明幸且非春時萬物不嬌荣青山破瓦色緑水氷峥嵘花枯無女艶鳥死沉􅁔聲頑冬何􅀁好偏使一目盲傳聞古老説蝕月蝦蟆精􅈳圓千里入汝腹汝此癡骸阿誰生可􅀙海窟来便􅄙縁青􅁳恐是眶􅊿間揞塞􅀁化成黄帝有二目帝舜童瞳明二帝懸四目四海生光輝吾不遇二帝滉􅐯不可知何故瞳子上坐受蟲豸欺長嗟白兎搗􅂕薬恰似有意防姦非薬成滿臼不中度委任白兎夫何為憶昔堯為天十日燒九州金爍水銀流玉煼音炒丹砂焦六合烘為窯音遥堯心增百􅁨帝見尭心􅁨勃然發怒决洪流立擬沃殺九日妖天髙日走沃不及但見萬國赤子􅋾􅋾生魚頭此時九御導九日争持節幡麾幢旒駕車六九五十四頭蛟螭虬掣電九火輈汝􅀂蝕開齱齵輪御轡執索相􅐡鉤推蕩轟訇入汝喉紅鱗􅆋鳥燒口快翎鬛倒側聲醆鄒撑腸拄肚礧傀如山丘自可飽死更不偷不獨塡飢坑亦觧尭心􅁨恨汝時當食藏頭㩎腦不肯食不當食張唇哆觜食不休食天之眼飬逆命安淂上帝請汝劉嗚呼人飬乕被虎齧天媚蟆􅀍蟆瞎乃知恩非􅁼一一自作孽吾見患眼人必索良工訣想天不異人愛眼固應一安淂常娥氏来習扁鵲術手操舂喉戈去此睛上物其􅀄猶䑃朧既乆如抹􅃮但􅂲功業成便此不􅄍出玉川子又涕泗下心禱再拜額榻砂􅁟中地上蟣虱臣仝告愬帝天皇臣心有鐡一寸可刳妖蟆癡腸上天不爲臣立梯蹬臣血􅁏身無由飛上天􅀭天光封詞付與小心風颰排閶闔入紫宫密迩玉几前擘坼奏上臣仝頑愚胸敢死横干天代天謀其長東方蒼龍角挿㦸尾捭風當心開明堂綂領三百六十鱗􅆉坐理東方宫月蝕不救援安用東方龍南方火鳥赤潑血項長尾短飛䟦躠頭戴井冠髙逹枿月蝕鳥宫十三度鳥爲居停主人不􅁴察貪向何人家行赤口毒舌毒虫頭上喫却月不啄殺虗眨􅀑眼明突䆷鳥罪不可雪西方攫虎立踦踦斧爲牙鑿爲齒偷犠牲食封豕大蟆一臠固當軟美見似不見是何道理爪牙根天不念天天􅀂准擬錯准擬北方寒亀被虵縛藏頭入殻如入獄虵筋束􅂃束破殻寒亀夏鼈一種味且當臛其􅁏一􅔄板没信䖏唯堪支􅇃脚不堪鑚灼與天下卜􅀊星主福徳官爵奉董秦􅃘使黔娄生覆尸無衣巾天失眼不吊􅀊星胡其仁惑熒矍鑠翁執法大不中月明無罪過不糺蝕月􅆉年年十月朝太微支盧謫罰何災凶􅁟星與􅁟性相背反飬福徳生祸害到人頭上死破敗今夜月蝕安可會太白真􅀅軍怒􅈭􅄡鋩生􅁪州陣斬酈定進項骨脆甚春蔓青天唯両眼失一眼􅀅軍何䖏行天兵辰星任廷尉天律自主持人命在盆底固􅀿楽見天盲時天􅀂不肯信試喚臯陶鬼一問一如今日三台文昌宫作上天紀綱環天二十八磊磊尚書􅀰整頓排班行劍握他人􅀅一四太陽側一四天市傍􅋵斧代大匠両手不怕傷􅓡矢引滿反射人天狼呀啄明煌煌癡牛與騃女不肯勤農桑徒劳含􅁋思旦夕遥相望蚩尤簸箕弄旬朔始搥天鼓鳴璫琅枉矢􅀎虵行眊目森森張天狗下䑛地血流何滂滂譎險萬萬黨架何可當眯目舋成就害我光明王請留北斗一星相北極指麾萬􅀦懸中央此外盡掃除堆積如山岡贖我父母光當時常星沒殞雨如迸漿似天會亊􅀤叱喝誅奸強何故中道廢自遺今日殃善善又􅁖悪郭公􅀁以亡願天神聖心無信他人忠玉川子詞訖風色􅂃格格近月黒暗邉有似動劍㦸湏􅁷癡蟆精両吻自決拆􅀄露半箇璧漸􅄍滿輪魄衆星盡原赦一蟆獨誅磔腹肚忽脱落依旧掛穹碧光彩未蘓来慘澹一片白柰何萬里光受此吞􅄍厄再淂見天眼感何天地力或問玉川子孔子脩春秋二百四十年月蝕盡不􅀵今子咄咄詞頗合孔意不玉川子􅀏荅或請聴逗留孔子父母魯諱魯不諱周書外書大􅁖故月蝕不見􅀵予命唐天口食唐􅁟唐禮過三唐楽過五小猶不説大不可数灾沴無有小大瘉安引衰周研覈可否日分晝月分夜辨寒暑一主刑二主徳政乃舉孰謂人面上一目偏可去願天完两目照下萬方􅁟萬古更不瞽萬萬古更不瞽照萬古哭玉碑子山有洞左頰拾淂玉碑子其長一周尺其闊一藥匕顔色九秋天稜角四面起􅁿敲􅄍寒流清悲動神􅀑稽首置手中只似一片水至文反無文上帝應有以予疑仙石􅂕􅂅以仙人比心期香湯洗歸送籙堂裏頗柰窮相驢行動如跛鼈十里五里行百蹶􅂧千蹶顔子不少夭玉碑中路折横文尋亀兆直理任瓦裂劈竹不可合破環永離别向人如有情似痛滴無血勘闘平地上罅折多齧缺百見百傷心不堪再提挈怪㢤堅貞姿葱脆不堅固矧曰人間人安􅀎保常度敢問生物成敗為有真素為禀􅂕異氣不淂受􅁾汚驢罪真不厚驢生亦錯誤更􅀅前前行􅂧􅂲山神怒白雲蓊閉嶺髙松吟古墓置此忍其傷驅驢下山去􅀚放魚􅁔常州賢刺史從諌議大夫除天地好生物刺史性與天地俱見山客狎魚鳥坐山客北亭湖命舟人駕舫子漾􅃞菰蒲酒興引行處正見漁人魚刺史宻㑹山客意􅂧念網羅嬰無辜忽脱身上殷緋􅂁盡買罟擭盡有無鰻鱣鮎鳢鰌延􅁖最頑愚鱒魴見豳風質􅆬稍髙流時白噴雪鯽鯉此􅒰肥脆為絶􅀹老鯉変化頗神異三十六鱗如抺朱水苞弘窟有鮫鼉餌非龍餌唯無鱸叢雜百千頭性命懸湏􅁷天心􅀿刺史刺史盡活諸一一投深淵跳脱不􅂧拘淂水競騰突動作詭怪殊􅂉透􅇨而出􅂉破浪而趋或掉尾孑孑或奮鬛愉愉或如或如虵銜珠四散漸不見島嶼徒萦紆鸂鵣鴒鷗鳧喜􅀚争呌呼小鰕亦相􅂟遶岸摇其鬚乃知貪生不獨頑凝夫可憐百千命㡬為腸中􅉁􅀂飬聖賢真大烹龍髄敢惜乎若痛如今人盡是魚食魚族􅁼恣飲噉强力無親踈明明刺史心不欲與物相欺誣岸􅆉両與命無意殺此活彼用賊徒亦憶清江使橫遭乎余且神聖七十鑚不及泥中鰌哀㢤託非賢五臟生􅁈讎􅀂當刺史時聖物保不囚不疑且不卜二子安􅀎䛕二子倘故䛕吾知心受誅禮重一草木昜卦稱中孚又曰釣不綱又曰逺庖厨故仁人用心刺史盡合符昔鲁公􅀚棠距箴遂􅀍孔子貶而書今刺史好生徳洽民心誰爲刺史一褒譽刺史自上来徳風如草鋪衣冠興廢禮百姓減􅁀租豪􅠕不豪猾鰥􅀌不鰥􅀌開古孟瀆三十里四千頃泥坈爲膏􅃾刺史視之縂若無訟庭雀噪坐不淂湖上拔茭植芙蕖勝業荘中二桑門時時對坐談真如因說十千天子亊福力當與刺史俱天花曼陀羅花深沒膝四十千真珠纓絡堆髙楼此亊怪特不可會但慕刺史仁有餘刺史勑左右兼小家奴慎勿背我沉毒鈎念魚承􅆢刺史仁深僻處逺逺逰刺史官職小教化未􅀎敷第一莫近人􅁖人唯口䛕第一莫出境四境多網􅅈重傷刺史心䘮爾㣲賤軀示添丁春風苦不仁呼逐馬蹄行人家慚愧瘴氣却憐我入我憔悴􅇧中為生涯数日不食強強行何忍索我抱㸔滿􅀣花不知四体正困􅉵泥人啼哭聲呀呀忽来案上翻墨汁塗抺詩書如老鵶父憐母惜摑不淂却生癡笑令人嗟􅀫舂連曉不成米日髙始進一椀茶氣力龍鍾頭欲白慿仗添丁莫惱爺􅀉男抱孫别来三淂書書道違離久書䖏甚粗殺且喜見汝手殷十七又報汝文頗新有别来􅅻􅀴年囊盎未合斗當是汝母賢日夕加訓誘尚書當畢工禮記速湏剖喽囉児讀書何異摧枯朽尋義伯作聲便可飬年夀莫學村學生粗氣強呌吼下學偷工夫新宅鋤䔧莠乗凉􅂆奴婢園裏耨葱韮遠籬編榆􅁄近眼栽􅊝栁引水􅈅竹中蒲池種蓮藕捞漉蛙䗫脚莫遣生科斗竹林吾最惜新筍好㸔守萬籜苞龍児攅迸溢林薮吾眼恨不見心腸痛如搊宅錢都未還債利日日厚籜龍正稱􅁈莫殺入汝口丁寕囑託汝汝活籜龍不殷十七老儒是汝父師友傳讀有疑悮􅂺告諮問取両手莫破拳一吻莫飲酒莫學捕鳩鴿莫學打雞狗小時無大傷習性防已沒頑發苦惱人汝母必不受任汝惱弟妹任汝惱姨舅姨舅非吾親弟妹多老醜莫惱添丁􅀰涙子作面垢莫引添丁􅀰赫赤日裏走添丁􅀰小小别吾来久久脯脯不淂喫兄兄莫撚搜他日吾㱕来家人若弹糺一百放一下打汝九十九自詠三首為報玉川子知君未是賢伯地雖有地仰面輙無天骨􅁏淸成瘦萵蔓老􅁴羶家書與心亊相伴過流年盧子龍鍾也賢愚搃莫驚蚊䗈當家口草石是親情萬􅃃堆胸朽三光撮眼明翻悲廣成子閑氣説長生物外無知已人間一癖王生涯身是夣躭楽酒為鄊日月黏髭􅁂雲山鎖肺腸愚公只公是不用謾驚張送王儲詹亊西逰献兵書美酒撥醅酌楊花飛盡時落日長安道方寸無人知篋中制勝術氣雄屈指􅄸半酔千殷勤仰天一長嘆玉匣百錬劍亀文又龍吼抽贈王将軍勿使虗白首送卲兵曹㱕江南春風楊栁陌連􅀐醉離觴千里逺山碧一條歸路長花開愁北渚雲去渡南湘東望濛濛䖏煙波是故郷􅀉外兄魏澈何䖏堪惆悵情親不淂親興寕楼上月辜負酒家春喜逄鄭三逰山相逄之䖏花茸茸石壁攅􅄘千萬重他日期君何處好寒流石上一株松卓女怨妾本懐春女春懐不自任迷魂随鳳客嬌思入琴心託援交情重當壚酌意深誰家有夫婿作賦淂黄金守􅀊二首去年留不住来年也任他當壚一榼酒争奈両年何老来􅀴莭臘楽亊甚悠悠不及児童日都盧不􅄙愁新月仙宫雲箔􅃃露出玉􅄕鈎清光無􅀁贈相憶鳯凰楼􅄙悶人生都㡬日一半是離􅁨但有尊中物従他萬亊休楊子津風􅃃魚龍暗楚􅀜白波沉却海門山鵬騰鰲倒且快性地圻天開搃是閑人日立春春度春㱕無限春今朝方始􅁴成人從今剋已應猶及顔與梅花俱自新送尉遲羽之㱕宣州君㱕乎君㱕興不􅀌謝眺澄江今夜月也應憶著此山夫悲新年新年何事最堪悲病客遥聴百舌児太􅀊只逰􅊝李􅈳春風肯􅃹歳寒枝憶酒􅀉劉侍􅀰爱酒如偷􅁡憎醒似見刀君為麯蘖主酒醴莫辞劳白鷺鷥刻成片玉白鷺鷥欲捉纎鱗心自急翹足沙頭不淂時傍人不知謂閑立風中琴五音六律十三徽龍吟鶴响思庖羲一弹流水一弹月水月風生松􅀣枝感秋别怨霜秋自断魂楚調怨離分魄散瑶䑓月心随巫峡雲蛾眉誰共畵鳳曲不同聞莫似湘妃淚斑斑􅀧翠裙新蝉泉溜潜幽咽琴鳴乍徃還長風剪不断還在􅀣枝間題禇遂良孫庭竹負霜停雪田根枝龍笙鳯􅃹君莫截春風一畨琴上来摇碎金罇碧天月訪含曦上人三入寺曦未来轆轤無䋲井百尺渴心歸去生塵埃含曦酬長夀寺石壁盧公一首詩渇讀即不渇飢讀即不飢鯨飲海水盡露出􅃢瑚枝海神知貴不知價留向人間光照夜客淮南病揚州蒸毒似燂湯客病清枯􅁂欲霜且喜閉門無俗物四肢安稳一張床村醉昨夜村飲㱕徤倒三四五摩挲青毎苔莫嗔驚著汝蕭宅二三子贈荅詩二十首并序蕭才子修文行名聞􅀅遷家于洛賣楊州宅未售玉川子客楊州羇旅識蕭遂舘蕭未售之宅既而蕭有事于歙州玉川子欲㱕洛憶蕭遂與砌下二三子酬酢説相媿意俄而二三子有􅁨宅售心與其他人手孰與洛客以蕭故亦有勉強不􅀎逆其情文以見意遂盡録􅀉蕭天知地知非苟有􅀁欲二三子心逺訥君子蕭乎蕭乎君㱕不淂見者細長三四片者乎客贈石竹下青莎中細長三四片主人雖不㱕長見主人面石譲竹自顧撥不轉何敢當主人竹弟有清風可以娱佳賔竹答客竹弟謝石兄清風非􅀁任随分有蕭瑟實無堅重心石請客竹弟雖譲客不敢當客㤙自慙埋沒久滿面蒼苔痕客荅石遍索天地間彼此最癡癖主人幸未来與君為莫逆石荅竹石報孤竹君此客甚髙調共我相共癡不怕主人天下笑我非蛱蝶児我非桃李枝不要児女撲不要春風吹苔蘚印我面雨露皴我皮此故不嫌我突兀䝉相知此客即西㱕我心徒依依我欲随客去累重不觧飛知弟虚心亦待客此客何以共報之竹請客我夲㤗山阿避地到南􅀦主人欲移家我亦要歸北上客幸先歸願託㱕飛翼唯􅀅翛翛風累路報㤙徳客謝竹楊州駮雜地不辨龍蜥蝪客身正乾枯行䖏無膏澤太山道不遠相庇实無力君􅀂随我行必有煎茶厄石請客啟母是諸母三十六􅄘是諸父知君家近父母家小人安淂不懐􅁟憐君與我金石交君㱕可淂共載否小人無以報君㤙使君池亭風月古客謝石我有水竹荘甚近嵩之巔是君㱕休䖏可以終天年雖有提携劳不􅁨粮食錢但􅂲主人心疑我相釣竿石再請客主人􅀂知我應喜我結淂君主人不知我我住何求于主人我在天地間自是一片物可淂杠壓我使我頭不出客許石石公説道理句句出凡格相知貴知心豈恨主為客過湏㱕去来旦晚上無厄主人誠賢人多應不相責井請客我生天地間頗是徃還数已効炊㸑劳我亦不願住君有造化力在君一降頋我願㧞黄泉􅁿舉随君去客謝井改邑不改井此是井卦辭井公莫怪驚説我成憨癡我縱有神力争敢􅀅公㱕􅀭州􅁖百姓疑我􅃃地皮馬蘭請客蘭蘭是小草不怕􅀰君駡願淂随君行暫到嵩山下客請馬蘭嵩山未必憐蘭蘭蘭蘭已受􅀰君恩不湏刷帚跳蹤赱只擬蘭浪出其門蛱蝶請客粉末爲四体春風爲生涯願淂紛飛去與君爲眼花客請蛱蝶君是􅁿薄子莫窺君子腸且湏看雀児雀児銜尔􅀅蝦䗫請客凡有水竹處我曺長先行願君借我一勺水與君晝夜􅁔徳聲客請蝦䗫蝦䗫䗫叩頭莫語人聞聲揚州蝦蜆忽淂便腥臊臭􅁾逐我行我身化作青泥坑玉川子詩外集古今骵走茟追王内丘自識夫子面便􅀗夫子心夫子一啟顔義重千黄金平原孟嘗骨已􅁟始有夫子堪知音忽然夫子不語􅅁蓆㡌􅀐驢去余對醁醽不􅀎斟君且来余之瞻望心悠㢤零雨其濛愁不散閑花寂寂班堦苔不如對此景含咲傾金罍莫問四肢暢暫取眉頭開絃琴待夫子夫子来不来思君吟􅀉生我思君兮河之壖我為河中之泉君為河中之青天天青青泉泠泠泉含青天天隔泉我思君􅀆心亦然心亦然此心復在天之側我心為風􅀆淅淅君身為雲􅀆羃羃此風引此雲􅀆雲不来此風此雲􅀆何悠㢤與我身心雙徘徊􅀅歸山招冰僧買淂一片田濟源花洞前千里石壁坼一條流泌泉青松盤樛枝森森上挿青冥天枝上有猿宿處近鶴巢清唳􅀌吟聲相交月輪下射空洞响􅁝篁成韻風蕭蕭我心塵外心愛此塵外物欲結塵外交苦無塵外􅇧泌泉有冰公心静見真佛可結塵外交占此松與月酬願公雪中見􅀉積雪三十日車馬路不通貧病交親絶想憶唯願公春鳩報春歸苦寒生暗風簷乳堕懸玉日脚浮䡖紅梅栁意却活園圃氷始融更侯四体好方可到寺中苦雪􅀉退之天生二月行時令白銀作雪漫天涯山人門前徧受賜平地一尺白玉沙雲頽月壊桂英下鶴毛風剪􅅍参差山人屋中凍欲死千􅀣萬􅀣飛春花菜頭出􅁟􅑟入地山荘取粟埋却車冷絮刀生削峭􅇧冷虀斧破慰老牙病妻烟眼淚滴滴飢嬰哭乳聲呶呶市頭愽米不用物酒店買酒不肯賖聞道西風弄劔㦸長堦殺人如亂麻天眼髙開欺草茅我死未肯興嘆嗟但恨口中無酒氣劉伶見我相榆椰清風􅭒腸筋力絶白􅁅壓屋梁柱斜聖明有道薄命漢可淂再見朝日􅁘柴門没胫晝不掃黄昏遶􅀣棲寒鴉唯有河南韓縣令時時醉飽過貧家􅀉贈含曦上人楞伽大師兄誇曦識道理破鎖推玄關髙辨果難揣論語老荘昜搜索通神􅀑起信中百門敲􅇧淂佛髄此外雜􅀴律泛讀一萬紙髙殿排名僧執􅃃坐纍纍化物自一心三教齊􅀤􅁸随鍾嚼宫啇滿口文字美啇賈女􅀰軰不曽道生死縦遭强禮拜雅語不露齒劈破天地来莭義可屈指季展即此僧􅀌立無依􅀝近来爱作詩新竒頗煩委忽忽造古格削盡俗綺靡假如慵褁頭但勤讀書史切磋併工夫休逺不可比憐僧無逺信佛殊未已皃古饒風情清論興舋舋訪余十数度相去三五里見時心亦喜不見心亦喜見時談謔楽四座盡角嘴不見飬天和無人聒人耳昨朝披雪来面色赤韡韡封灶飬黄金許割方寸匕泥九佛教怛化荘亦恥未逹不敢嘗孔子疑季子薬成必分余余必投泥裏不如向陽堂撥醅泛浮蟻麹米本無􅄽酒成是法水行道不見心毁譽徒云爾雪晴天氣和日光弄梅李春鳥嬌闗關春風醉旎旎道上正無塵人家有花卉髙僧有柱杖願淂数覯止聴蕭君姫人彈琴弹琴人似􅂰上琴聴琴人似匣中絃二物各一處音韻何由傳無風質氣両相感萬般悲意方􅆞綿􅀄時天山之外飛白雪漸漸萬丈澗􅔄生流泉風梅花落􅁿揚揚十指乾浄聲㳙㳙昭君可惜嫁单于不遠只眼前蔡琰薄命没胡虜烏梟啾唧啼胡天關山險隔一萬里顔色錯漠生風烟形魄散逐五音盡雙娥結草空婵娟中腹苦恨杳不極新心愁絶難􅂧傳金尊湛湛夜沉沉餘音叠􅀤清聫綿主人醉盈有淂色座客向隅增内然孔子怪責顔回瑟野夫何亊蕭君筵拂衣屡命請中廢月照書窓㱕獨眠蜻蜓􅁔黄河中流日影斜水天一色無津涯䖏䖏驚波噴流飛雪花篙工檝師力且武進寸退尺莫􅀎度吾甚懼念汝小蟲子造化借羽翼随風􅃧中流翩然有餘力吾不如汝無他無羽翼吾􅀂有羽翼則上叩天關為聖君請矣臣布惠化于人間然後東飛浴東溟吸日精撼􅀂木之英紛而零使地上學仙之子淂而食之皆長生不學汝無端小蟲子葉葉水上無一亊忽遭風雨水中死出山作出山忘掩山門路釣竿挿在枯桑􅀣當時只有鳥窺窬更亦無人淂知䖏家僮􅀂失釣魚竿㝎是猿猴把􅀅去􅀉崔栁州使者立取書叠紙生百􅁨使君若不信他時看白頭三百六十州剋情唯栁州栁州蠻天末鄙夫嵩之幽花落隴水頭各自東西流凛凛長相逐為謝池上鷗贈稚禅師春風滿禅院師獨生南軒萬化見中盡始􅁴静性尊我来契平生目撃道自存與師不勤逰此㳺無迹門送好約法師歸江南杯度度一身法度度萬民為報江南三二日這囬應見雪中人蕭二十三赴歙州婚期二首淮上客情殊冷落蠻方春早客何如相思莫道無来使廻㕍􅄘前好􅀉書南方山水生時興教有新詩淂􅀉余路帯長安迢逓急多應不逐使君書掩關銘蛇毒毒有形藥毒毒有名人毒毒在心對面如弟兄美言不可聴深于千丈坑不如掩關坐幽鳥時一聲玉川子詩主于竒怪而語句渾成與唐之諸家不􅁼其茶􅁔月蝕二萹􅀹為丗􅀁傳誦昔之評詩者謂天地間不可無此則玉川詩之可愛者正以其怪耳予家藏宋刻本最為完善因夀之梓与騷壇之好竒者共後學徐獻忠䟦
