body:
  text: 􅃃第一古今詩月蝕詩哭玉碑子􅀚放魚􅁔示添丁􅀉男抱孫自詠三首送王儲詹亊西逰献兵書送卲兵曹㱕江南􅀉外兄魏澈喜逄鄭三逰山卓女怨守歳二首新月􅄙悶楊子津人日立春送尉遲羽之㱕宣州憶酒􅀉劉侍􅀰白鷺鷥風中琴感秋别怨新蝉題禇遂良孫庭竹訪含曦上人含曦酬客淮南病村酔蕭宅二三子贈荅詩二十首有序􅃃第二古今骵雜著走茟追王内丘思君吟􅀉生􅀅歸山招冰僧酬願公雪中見􅀉苦雪􅀉退之􅀉贈含曦上人聽蕭君姫人彈琴蜻蜓􅁔出山作􅀉崔栁州贈稚禅師送好約法師歸江南蕭二十三赴歙州婚期二首掩關銘玉川子詩外集序唐玉川先生盧仝􅂂道守正之莭見于昌􅀺退之之文當時洛中才名碩徳者如温石二處士咸應辟署吏于諸侯惟先生自頋俯仰不􅀎與丗合築環堵以居休焉遂志而浩浩自娱􅀚其出處之迹􅀂人㢤安可􅁿量矣又傳先生春秋之學舉丗莫淂見其書故人不淂窺其涯涘矣但􅁔詩百萹􅍢板已行于丗其為体峭挺嚴放脱略拘維特立群品之外要夫指亊措意于救物之為忠憤切深者矣常爱其詩恨不淂多見其篇近友人李生于道士崔懐玉處又淂集外一十五首余甚喜之以編附舊夲且夫人之愚哲存乎性道之用舎係乎時倘氣􅁼孚應上下感㑹則見諸行亊于空言安足貴尚㦲惜其失志窮時用是欲傳其言耳謹序其槩以貽于好亊者云時慶暦八年仲冬望日昌黎韓盈謙甫序
