  text: 玉川子集卷第一
  hash: sha256:d0ad5673770b64f2545f08b74df8334cfc422244443ef86f769dbe92969aa98c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0092_SBCK_001-1a}
body:
  text: 古今詩月蝕詩新天子即位五年歲次庚寅斗柄插子律調黃鍾森森萬木夜殭立寒氣贔屓頑無風爛銀盤從海底出出來照我草屋東天色紺滑凝不流氷光交貫寒朣朧𥘉疑白蓮花浮出龍王宫八月十五夜比並不可雙此時怪事發有物吞食來輪如壯士斧斫壞桂似雪山風拉摧百錬鏡照見膽平地埋寒灰火龍珠飛出腦却入蚌蛤胎摧環破壁眼看盡當天一搭如煤炲磨蹤滅迹須臾間便似萬古不可開不料至神物有此大狼狽星如撒沙出爭頭事光大奴婢炷暗燈掩鳥感菼如玳瑁今夜吐𦦨長如虹孔隙千道射户外玉川子涕泗下中庭獨自行念此日月者太隂太陽精皇天要識物日月乃化生走天汲汲勞四體與天作眼行光明此眼不自保天公行道何由行吾見隂陽家有説望日蝕月月光滅朔月掩日日光缺兩眼不相攻此説吾不容又孔子師老子云五色令人目盲吾恐天似人好色即喪明幸且非春時萬物不嬌榮青山破瓦色緑水氷峥嶸花枯無女艷鳥死沉歌聲頑冬何所好偏使一目盲傳聞古老説蝕月蝦蟆精徑圓千里入汝腹汝此癡骸阿誰生可從海窟來便解緣青冥恐是眶睫間掩塞所化成黃帝有二目帝舜童瞳明二帝懸四目四海生光輝吾不遇二帝滉􅐯不可知何故瞳子上坐受蟲豸欺長嗟白兔搗靈藥恰似有意防姦非藥成滿臼不中度委任白兔夫何為憶昔堯為天十日燒九州金爍水銀流玉煼音炒丹砂焦六合烘為窯音遙堯心增百憂帝見堯心憂勃然發怒決洪流立擬沃殺九日妖天髙日走沃不及但見萬國赤子􅋾􅋾生魚頭此時九御導九日爭持節幡麾幢旒駕車六九五十四頭蛟螭虬掣電九火輈汝若蝕開齱齵輪御轡執索相􅐡鉤推蕩轟訇入汝喉紅鱗𦦨鳥燒口快翎鬛倒側聲盞鄒撑腸拄肚礧傀如山丘自可飽死更不偷不獨填飢坑亦解堯心憂恨汝時當食藏頭擫腦不肯食不當食張唇哆觜食不休食天之眼飬逆命安淂上帝請汝劉嗚呼人飬乕被虎齧天媚蟆𬒳蟆瞎乃知恩非類一一自作孽吾見患眼人必索良工訣想天不異人愛眼固應一安淂常娥氏來習扁鵲術手操舂喉戈去此睛上物其𥘉猶朦朧既久如抹􅃮但恐功業成便此不吐出玉川子又涕泗下心禱再拜額榻砂土中地上蟣虱臣同告訴帝天皇臣心有鐡一寸可刳妖蟆癡腸上天不為臣立梯蹬臣血肉身無由飛上天揚天光封詞付與小心風颰排閶闔入紫宫密邇玉几前擘坼奏上臣同頑愚胸敢死橫干天代天謀其長東方蒼龍角插戟尾捭風當心開明堂統領三百六十鱗蟲坐理東方宫月蝕不救援安用東方龍南方火鳥赤潑血項長尾短飛跋躠頭戴井冠髙逹枿月蝕鳥宫十三度鳥為居停主人不覺察貪向何人家行赤口毒舌毒蟲頭上喫却月不啄殺虗眨鬼眼明突䆷鳥罪不可雪西方攫虎立踦踦斧為牙鑿為齒偷犧牲食封豕大蟆一臠固當軟美見似不見是何道理爪牙根天不念天天若準擬錯準擬北方寒龜被蛇縛藏頭入殼如入獄蛇筋束緊束破殼寒龜夏鱉一種味且當臛其肉一􅔄板沒信處唯堪支牀腳不堪鑽灼與天下卜歲星主福德官爵奉董秦忍使黔婁生覆尸無衣巾天失眼不吊歲星胡其仁惑熒矍鑠翁執法大不中月明無罪過不糾蝕月蟲年年十月朝太微支盧謫罰何災凶土星與土性相背反飬福德生禍害到人頭上死破敗今夜月蝕安可會太白真將軍怒激鋒鋩生恆州陳斬酈定進項骨脆甚春蔓青天唯兩眼失一眼將軍何處行天兵辰星任廷尉天律自主持人命在盆底固應樂見天盲時天若不肯信試喚臯陶鬼一問一如今日三台文昌宫作上天紀綱環天二十八磊磊尚書郎整頓排班行劍握他人將一四太陽側一四天市傍􅋵斧代大匠兩手不怕傷􅓡矢引滿反射人天狼呀啄明煌煌癡牛與騃女不肯勤農桑徒勞含淫思旦夕遙相望蚩尤簸箕弄旬朔始捶天鼓鳴璫琅枉矢能蛇行眊目森森張天狗下舐地血流何滂滂譎險萬萬黨架何可當眯目舋成就害我光明王請留北斗一星相北極指麾萬國懸中央此外盡掃除堆積如山岡贖我父母光當時常星沒殞雨如迸漿似天會事發叱喝誅姦強何故中道廢自遺今日殃善善又惡惡郭公所以亡願天神聖心無信他人忠玉川子詞訖風色緊格格近月黑暗邉有似動劍戟須臾癡蟆精兩吻自決拆𥘉露半箇璧漸吐滿輪魄衆星盡原赦一蟆獨誅磔腹肚忽脫落依舊挂穹碧光彩未蘇來慘淡一片白奈何萬里光受此吞吐厄再淂見天眼感何天地力或問玉川子孔子修春秋二百四十年月蝕盡不收今子咄咄詞頗合孔意不玉川子笑答或請聽逗留孔子父母魯諱魯不諱周書外書大惡故月蝕不見收豫命唐天口食唐土唐禮過三唐樂過五小猶不説大不可數災沴無有小大愈安引衰周研核可否日分晝月分夜辨寒暑一主刑二主德政乃舉孰謂人面上一目偏可去願天完兩目照下萬方土萬古更不瞽萬萬古更不瞽照萬古哭玉碑子山有洞左頰拾淂玉碑子其長一周尺其闊一藥匕顔色九秋天稜角四面起輕敲吐寒流清悲動神鬼稽首置手中只似一片水至文反無文上帝應有以豫疑仙石靈碩以仙人比心期香湯洗歸送籙堂裏頗奈窮相驢行動如跛鱉十里五里行百蹶𣸪千蹶顔子不少夭玉碑中路折橫文尋龜兆直理任瓦裂劈竹不可合破環永離别向人如有情似痛滴無血勘鬪平地上罅折多齧缺百見百傷心不堪再提挈怪哉堅貞姿蔥脆不堅固矧曰人間人安能保常度敢問生物成敗為有真素為稟靈異氣不淂受穢汚驢罪真不厚驢生亦錯誤更將前前行𣸪恐山神怒白雲蓊閉嶺髙松吟古墓置此忍其傷驅驢下山去觀放魚歌常州賢刺史從諌議大夫除天地好生物刺史性與天地俱見山客狎魚鳥坐山客北亭湖命舟人駕舫子漾漾菰蒲酒興引行處正見漁人魚刺史密會山客意𣸪念網羅嬰無辜忽脫身上殷緋𫀆盡買罟擭盡有無鰻鱣鮎鱧鰌延惡最頑愚鱒魴見豳風質幹稍髙流時白噴雪鯽鯉此􅒰肥脆為絶尤老鯉變化頗神異三十六鱗如抹朱水苞弘窟有鮫鼉餌非龍餌唯無鱸叢雜百千頭性命懸須臾天心應刺史刺史盡活諸一一投深淵跳脫不𣸪拘淂水競騰突動作詭怪殊或透藻而出或破浪而趨或掉尾孑孑或奮鬛愈愈或如或如蛇銜珠四散漸不見島嶼徒縈紆鸂鵣鴒鷗鳧喜觀爭呌呼小蝦亦相慶繞岸搖其鬚乃知貪生不獨頑凝夫可憐百千命幾為腸中𦵔若飬聖賢真大烹龍髓敢惜乎若痛如今人盡是魚食魚族類恣飲噉強力無親踈明明刺史心不欲與物相欺誣岸蟲兩與命無意殺此活彼用賊徒亦憶清江使橫遭乎余且神聖七十鑽不及泥中鰌哀哉託非賢五臟生冤讎若當刺史時聖物保不囚不疑且不卜二子安能諛二子倘故諛吾知心受誅禮重一草木昜卦稱中孚又曰釣不綱又曰逺庖厨故仁人用心刺史盡合符昔魯公觀棠距針遂𬒳孔子貶而書今刺史好生德洽民心誰為刺史一褒譽刺史自上來德風如草鋪衣冠興廢禮百姓減暴租豪􅠕不豪猾鰥孤不鰥孤開古孟瀆三十里四千頃泥坈為膏腴刺史視之總若無訟庭雀噪坐不淂湖上拔茭植芙蕖勝業莊中二桑門時時對坐談真如因説十千天子事福力當與刺史俱天花曼陀羅花深沒膝四十千真珠纓絡堆髙樓此事怪特不可會但慕刺史仁有餘刺史勑左右兼小家奴慎勿背我沉毒鈎念魚承奉刺史仁深僻處逺逺逰刺史官職小教化未能敷第一莫近人惡人唯口諛第一莫出境四境多網罟重傷刺史心喪爾微賤軀示添丁春風苦不仁呼逐馬蹄行人家慚愧瘴氣却憐我入我憔悴骨中為生涯數日不食強強行何忍索我抱看滿樹花不知四體正困􅉵泥人啼哭聲呀呀忽來案上翻墨汁塗抹詩書如老鴉父憐母惜摑不淂却生癡笑令人嗟宿舂連曉不成米日髙始進一碗茶氣力龍鍾頭欲白慿仗添丁莫惱爺寄男抱孫别來三淂書書道違離久書處甚粗殺且喜見汝手殷十七又報汝文頗新有别來才經年囊盎未合斗當是汝母賢日夕加訓誘尚書當畢工禮記速須剖嘍囉兒讀書何異摧枯朽尋義伯作聲便可飬年夀莫學村學生粗氣強呌吼下學偷工夫新宅鋤䔧莠乘涼勸奴婢園裏耨蔥韭遠籬編榆棘近眼栽桃栁引水灌竹中蒲池種蓮藕撈漉蛙蟆腳莫遣生科斗竹林吾最惜新筍好看守萬籜苞龍兒攢迸溢林藪吾眼恨不見心腸痛如搊宅錢都未還債利日日厚籜龍正稱冤莫殺入汝口丁寧囑託汝汝活籜龍不殷十七老儒是汝父師友傳讀有疑悮輒告咨問取兩手莫破拳一吻莫飲酒莫學捕鳩鴿莫學打雞狗小時無大傷習性防已沒頑發苦惱人汝母必不受任汝惱弟妹任汝惱姨舅姨舅非吾親弟妹多老醜莫惱添丁郎淚子作面垢莫引添丁郎赫赤日裏走添丁郎小小别吾來久久脯脯不淂喫兄兄莫撚搜他日吾歸來家人若彈糾一百放一下打汝九十九自詠三首為報玉川子知君未是賢伯地雖有地仰面輒無天骨肉淸成瘦萵蔓老覺羶家書與心事相伴過流年盧子龍鍾也賢愚總莫驚蚊虻當家口草石是親情萬卷堆胸朽三光撮眼明翻悲廣成子間氣説長生物外無知已人間一癖王生涯身是夢耽樂酒為鄊日月黏髭鬢雲山鎖肺腸愚公只公是不用謾驚張送王儲詹事西逰獻兵書美酒撥醅酌楊花飛盡時落日長安道方寸無人知篋中制勝術氣雄屈指算半醉千殷勤仰天一長嘆玉匣百錬劍龜文又龍吼抽贈王將軍勿使虗白首送卲兵曹歸江南春風楊栁陌連騎醉離觴千里逺山碧一條歸路長花開愁北渚雲去渡南湘東望濛濛處煙波是故鄉寄外兄魏徹何處堪惆悵情親不淂親興寧樓上月辜負酒家春喜逄鄭三逰山相逄之處花茸茸石壁攢峯千萬重他日期君何處好寒流石上一株松卓女怨妾本懷春女春懷不自任迷魂隨鳳客嬌思入琴心託援交情重當壚酌意深誰家有夫壻作賦淂黃金守歲二首去年留不住來年也任他當壚一榼酒爭奈兩年何老來經莭臘樂事甚悠悠不及兒童日都盧不解愁新月仙宫雲箔卷露出玉簾鈎清光無所贈相憶鳯凰樓解悶人生都幾日一半是離憂但有尊中物從他萬事休楊子津風卷魚龍暗楚關白波沉却海門山鵬騰鰲倒且快性地圻天開總是間人日立春春度春歸無限春今朝方始覺成人從今剋已應猶及顔與梅花俱自新送尉遲羽之歸宣州君歸乎君歸興不孤謝眺澄江今夜月也應憶著此山夫悲新年新年何事最堪悲病客遙聽百舌兒太歲只逰桃李徑春風肯𬋩歲寒枝憶酒寄劉侍郎愛酒如偷蜜憎醒似見刀君為麯蘖主酒醴莫辭勞白鷺鷥刻成片玉白鷺鷥欲捉纎鱗心自急翹足沙頭不淂時傍人不知謂間立風中琴五音六律十三徽龍吟鶴響思庖羲一彈流水一彈月水月風生松樹枝感秋别怨霜秋自斷魂楚調怨離分魄散瑶臺月心隨巫峽雲蛾眉誰共畫鳳曲不同聞莫似湘妃淚斑斑點翠裙新蟬泉溜潛幽咽琴鳴乍往還長風剪不斷還在樹枝間題禇遂良孫庭竹負霜停雪田根枝龍笙鳯𬋩君莫截春風一畨琴上來搖碎金樽碧天月訪含曦上人三入寺曦未來轆轤無繩井百尺渴心歸去生塵埃含曦酬長夀寺石壁盧公一首詩渴讀即不渴飢讀即不飢鯨飲海水盡露出珊瑚枝海神知貴不知價留向人間光照夜客淮南病揚州蒸毒似燂湯客病清枯鬢欲霜且喜閉門無俗物四肢安穩一張床村醉昨夜村飲歸健倒三四五摩挲青每苔莫嗔驚著汝蕭宅二三子贈答詩二十首并序蕭才子修文行名聞將遷家于洛賣楊州宅未售玉川子客楊州羇旅識蕭遂館蕭未售之宅既而蕭有事于歙州玉川子欲歸洛憶蕭遂與砌下二三子酬酢説相愧意俄而二三子有憂宅售心與其他人手孰與洛客以蕭故亦有勉強不能逆其情文以見意遂盡録寄蕭天知地知非苟有所欲二三子心逺訥君子蕭乎蕭乎君歸不淂見者細長三四片者乎客贈石竹下青莎中細長三四片主人雖不歸長見主人面石讓竹自顧撥不轉何敢當主人竹弟有清風可以娛佳賔竹答客竹弟謝石兄清風非所任隨分有蕭瑟實無堅重心石請客竹弟雖讓客不敢當客恩自慙埋沒久滿面蒼苔痕客答石遍索天地間彼此最癡癖主人幸未來與君為莫逆石答竹石報孤竹君此客甚髙調共我相共癡不怕主人天下笑我非蛺蝶兒我非桃李枝不要兒女撲不要春風吹苔蘚印我面雨露皴我皮此故不嫌我突兀蒙相知此客即西歸我心徒依依我欲隨客去纍重不解飛知弟虛心亦待客此客何以共報之竹請客我夲泰山阿避地到南國主人欲移家我亦要歸北上客幸先歸願託歸飛翼唯將翛翛風纍路報恩德客謝竹楊州駮雜地不辨龍蜥蝪客身正乾枯行處無膏澤太山道不遠相庇實無力君若隨我行必有煎茶厄石請客啓母是諸母三十六峯是諸父知君家近父母家小人安淂不懷土憐君與我金石交君歸可淂共載否小人無以報君恩使君池亭風月古客謝石我有水竹莊甚近嵩之巔是君歸休處可以終天年雖有提携勞不憂糧食錢但恐主人心疑我相釣竿石再請客主人若知我應喜我結淂君主人不知我我住何求于主人我在天地間自是一片物可淂杠壓我使我頭不出客許石石公説道理句句出凡格相知貴知心豈恨主為客過須歸去來旦晚上無厄主人誠賢人多應不相責井請客我生天地間頗是往還數已效炊㸑勞我亦不願住君有造化力在君一降顧我願拔黃泉輕舉隨君去客謝井改邑不改井此是井卦辭井公莫怪驚説我成憨癡我縱有神力爭敢將公歸揚州惡百姓疑我卷地皮馬蘭請客蘭蘭是小草不怕郎君罵願淂隨君行暫到嵩山下客請馬蘭嵩山未必憐蘭蘭蘭蘭已受郎君恩不須刷帚跳蹤赱只擬蘭浪出其門蛺蝶請客粉末為四體春風為生涯願淂紛飛去與君為眼花客請蛺蝶君是輕薄子莫窺君子腸且須看雀兒雀兒銜爾將蝦蟆請客凡有水竹處我曺長先行願君借我一勺水與君晝夜歌德聲客請蝦蟆蝦蟆蟆叩頭莫語人聞聲揚州蝦蜆忽淂便腥臊臭穢逐我行我身化作青泥坑玉川子詩外集古今骵走茟追王內丘自識夫子面便獲夫子心夫子一啓顔義重千黃金平原孟嘗骨已土始有夫子堪知音忽然夫子不語帶席帽騎驢去余對醁醽不能斟君且來余之瞻望心悠哉零雨其濛愁不散間花寂寂班階苔不如對此景含笑傾金罍莫問四肢暢暫取眉頭開絃琴待夫子夫子來不來思君吟寄生我思君兮河之壖我為河中之泉君為河中之青天天青青泉泠泠泉含青天天隔泉我思君兮心亦然心亦然此心復在天之側我心為風兮淅淅君身為雲兮羃羃此風引此雲兮雲不來此風此雲兮何悠哉與我身心雙徘徊將歸山招冰僧買淂一片田濟源花洞前千里石壁坼一條流泌泉青松盤樛枝森森上插青冥天枝上有猿宿處近鶴巢清唳孤吟聲相交月輪下射空洞響絲篁成韻風蕭蕭我心塵外心愛此塵外物欲結塵外交苦無塵外骨泌泉有冰公心靜見真佛可結塵外交占此松與月酬願公雪中見寄積雪三十日車馬路不通貧病交親絶想憶唯願公春鳩報春歸苦寒生暗風簷乳墮懸玉日腳浮輕紅梅栁意却活園圃氷始融更侯四體好方可到寺中苦雪寄退之天生二月行時令白銀作雪漫天涯山人門前遍受賜平地一尺白玉沙雲頽月壞桂英下鶴毛風剪亂參差山人屋中凍欲死千樹萬樹飛春花菜頭出土膠入地山莊取粟埋却車冷絮刀生削峭骨冷虀斧破慰老牙病妻煙眼淚滴滴飢嬰哭乳聲呶呶市頭博米不用物酒店買酒不肯賖聞道西風弄劔戟長階殺人如亂麻天眼髙開欺草茅我死未肯興嘆嗟但恨口中無酒氣劉伶見我相榆椰清風􅭒腸筋力絶白灰壓屋梁柱斜聖明有道薄命漢可淂再見朝日耶柴門沒脛晝不掃黃昏繞樹棲寒鴉唯有河南韓縣令時時醉飽過貧家寄贈含曦上人楞伽大師兄誇曦識道理破鎖推玄關髙辨果難揣論語老莊昜搜索通神鬼起信中百門敲骨淂佛髓此外雜經律泛讀一萬紙髙殿排名僧執卷坐纍纍化物自一心三教齊發起隨鍾嚼宫啇滿口文字美啇賈女郎輩不曽道生死縱遭強禮拜雅語不露齒劈破天地來莭義可屈指季展即此僧孤立無依倚近來愛作詩新竒頗煩委忽忽造古格削盡俗綺靡假如慵褁頭但勤讀書史切磋併工夫休逺不可比憐僧無逺信佛殊未已貌古饒風情清論興舋舋訪余十數度相去三五里見時心亦喜不見心亦喜見時談謔樂四座盡角嘴不見飬天和無人聒人耳昨朝披雪來面色赤韡韡封灶飬黃金許割方寸匕泥九佛教怛化莊亦恥未逹不敢嘗孔子疑季子藥成必分余余必投泥裏不如向陽堂撥醅泛浮蟻麴米本無愆酒成是法水行道不見心毁譽徒云爾雪晴天氣和日光弄梅李春鳥嬌關關春風醉旎旎道上正無塵人家有花卉髙僧有柱杖願淂數覯止聽蕭君姫人彈琴彈琴人似膝上琴聽琴人似匣中絃二物各一處音韻何由傳無風質氣兩相感萬般悲意方纏綿𥘉時天山之外飛白雪漸漸萬丈澗􅔄生流泉風梅花落輕揚揚十指乾淨聲涓涓昭君可惜嫁單于不遠只眼前蔡琰薄命沒胡虜烏梟啾唧啼胡天關山險隔一萬里顔色錯漠生風煙形魄散逐五音盡雙娥結草空嬋娟中腹苦恨杳不極新心愁絶難𣸪傳金尊湛湛夜沉沉餘音疊發清聫綿主人醉盈有淂色座客向隅增內然孔子怪責顔回瑟野夫何事蕭君筵拂衣屢命請中廢月照書窗歸獨眠蜻蜓歌黃河中流日影斜水天一色無津涯處處驚波噴流飛雪花篙工楫師力且武進寸退尺莫能度吾甚懼念汝小蟲子造化借羽翼隨風戲中流翩然有餘力吾不如汝無他無羽翼吾若有羽翼則上叩天關為聖君請矣臣布惠化于人間然後東飛浴東溟吸日精撼若木之英紛而零使地上學仙之子淂而食之皆長生不學汝無端小蟲子葉葉水上無一事忽遭風雨水中死出山作出山忘掩山門路釣竿插在枯桑樹當時只有鳥窺窬更亦無人淂知處家僮若失釣魚竿㝎是猿猴把將去寄崔栁州使者立取書疊紙生百憂使君若不信他時看白頭三百六十州剋情唯栁州栁州蠻天末鄙夫嵩之幽花落隴水頭各自東西流凛凛長相逐為謝池上鷗贈稚禪師春風滿禪院師獨生南軒萬化見中盡始覺靜性尊我來契平生目擊道自存與師不勤逰此遊無迹門送好約法師歸江南杯度度一身法度度萬民為報江南三二日這回應見雪中人蕭二十三赴歙州婚期二首淮上客情殊冷落蠻方春早客何如相思莫道無來使回堆峯前好寄書南方山水生時興教有新詩淂寄余路帶長安迢遞急多應不逐使君書掩關銘蛇毒毒有形藥毒毒有名人毒毒在心對面如弟兄美言不可聽深于千丈坑不如掩關坐幽鳥時一聲玉川子詩主于竒怪而語句渾成與唐之諸家不類其茶歌月蝕二萹尤為丗所傳誦昔之評詩者謂天地間不可無此則玉川詩之可愛者正以其怪耳豫家藏宋刻本最為完善因夀之梓與騷壇之好竒者共後學徐獻忠跋
